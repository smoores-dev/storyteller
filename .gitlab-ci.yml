stages: # List of stages for jobs, and their order of execution
  - check
  - publish
  - post-publish
  - prerelease
  - release

check:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:latest
  stage: check
  tags: [saas-linux-large-amd64]
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
  script:
    - yarn
    - yarn check

check-versions:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:latest
  stage: check
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
  script:
    - git fetch origin main --depth 1
    - ./scripts/check-versions.sh

check-docs:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:latest
  stage: check
  tags: [saas-linux-large-amd64]
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
      changes:
        - docs/**/*
  script:
    - yarn
    - yarn build:docs

test-web:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:latest
  stage: check
  tags: [saas-linux-large-amd64]
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
      changes:
        - web/**/*
  script:
    - yarn
    - yarn test:web

test-epub:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:latest
  stage: check
  tags: [saas-linux-large-amd64]
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
      changes:
        - epub/**/*
  script:
    - yarn
    - yarn test:epub

test-audiobook:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:latest
  stage: check
  tags: [saas-linux-large-amd64]
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
      changes:
        - audiobook/**/*
  script:
    - yarn
    - yarn test:audiobook

bump-versions:
  stage: prerelease
  image: node:24
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - cd web
    - PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
    - ../scripts/if-version-change.sh git tag web-v${PACKAGE_VERSION}
    - cd ../docs
    - PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
    - ../scripts/if-version-change.sh git tag docs-v${PACKAGE_VERSION}
    - cd ../mobile
    - PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
    - ../scripts/if-version-change.sh git tag mobile-v${PACKAGE_VERSION}
    - cd ../fs
    - PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
    - ../scripts/if-version-change.sh git tag fs-v${PACKAGE_VERSION}
    - cd ../epub
    - PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
    - ../scripts/if-version-change.sh git tag epub-v${PACKAGE_VERSION}
    - cd ../audiobook
    - PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
    - ../scripts/if-version-change.sh git tag audiobook-v${PACKAGE_VERSION}
    - cd ../path
    - PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
    - ../scripts/if-version-change.sh git tag path-v${PACKAGE_VERSION}
    - cd ..
    - apt update && apt install -y --no-install-recommends git-lfs
    - git remote set-url origin
      https://ci-push-tag-token:${CI_PUSH_TAG_TOKEN}@gitlab.com/storyteller-platform/storyteller.git
    - git push --tags

pages:
  image: node:24-alpine
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^docs-v?\d+\.\d+\.\d+$/'
  script:
    - yarn workspaces focus @storyteller-platform/docs
    - yarn build:docs
  artifacts:
    paths:
      - public

publish-web-amd64:
  image: docker:24.0.5
  tags: [saas-linux-large-amd64]
  services:
    - name: docker:24.0.5-dind
      alias: docker
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^web-v?\d+\.\d+\.\d+(?:-\d+)?/'
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker context create gitlab-ci
    - docker buildx create --use --driver=docker-container gitlab-ci
  script:
    - docker buildx build --build-arg CI_COMMIT_TAG=$CI_COMMIT_TAG --push -f
      Dockerfile --cache-from
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-amd64:latest --cache-to
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-amd64:latest,mode=max --tag
      $CI_REGISTRY_IMAGE/amd64:$CI_COMMIT_SHORT_SHA .

publish-web-arm64:
  image: docker:24.0.5
  tags: [saas-linux-large-arm64]
  services:
    - name: docker:24.0.5-dind
      alias: docker
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^web-v?\d+\.\d+\.\d+(?:-\d+)?/'
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker context create gitlab-ci
    - docker buildx create --use --driver=docker-container gitlab-ci
  script:
    - docker buildx build --build-arg CI_COMMIT_TAG=$CI_COMMIT_TAG --push -f
      Dockerfile --cache-from
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-arm64:latest --cache-to
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-arm64:latest,mode=max --tag
      $CI_REGISTRY_IMAGE/arm64:$CI_COMMIT_SHORT_SHA .

publish-web-multiarch:
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  stage: post-publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^web-v?\d+\.\d+\.\d+(?:-\d+)?/'
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker buildx imagetools create --tag
      $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA --tag
      $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
      $CI_REGISTRY_IMAGE/amd64:$CI_COMMIT_SHORT_SHA
      $CI_REGISTRY_IMAGE/arm64:$CI_COMMIT_SHORT_SHA

prerelease-web:
  stage: prerelease
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^web-v?\d+\.\d+\.\d+(?:-\d+)?/'
  script:
    - apk add curl jq
    - version=$(echo $CI_COMMIT_TAG | sed -r 's/web-//')
    - package=$(echo $CI_COMMIT_TAG | sed -r 's/-v\d+\.\d+\.\d+.*$//')
    - 'from_sha=$(curl -H "PRIVATE-TOKEN: $CI_API_TOKEN"
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases" | jq -r "first(.[] |
      select(.tag_name | startswith(\"$package\")) | .commit.short_id)")'
    - to_sha=$CI_COMMIT_SHORT_SHA
    - 'curl -H "PRIVATE-TOKEN: $CI_API_TOKEN"
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/changelog?version=${version}&from=${from_sha}&to=${to_sha}&trailer=Changelog-web"
      | jq -r .notes > release_notes.md'
  artifacts:
    paths:
      - release_notes.md

release-web:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: prerelease-web
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^web-v?\d+\.\d+\.\d+(?:-\d+)?/'
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: release_notes.md
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_SHA"
    assets:
      links:
        - name: "Image for $CI_COMMIT_TAG"
          url: "https://$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"

