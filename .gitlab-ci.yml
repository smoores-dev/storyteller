publish-mobile:
  stage: publish
  image: node:24
  rules:
    - if: '$CI_COMMIT_TAG =~ /^mobile-v?\d+\.\d+\.\d+$/'
  script:
    - echo $EXPO_ASC_API_KEY_BASE64 | base64 -d > $EXPO_ASC_API_KEY_PATH
    - yarn
    - yarn workspace @storyteller-platform/mobile dlx eas-cli@latest build
      --profile production -p all --auto-submit --no-wait --non-interactive
    # Build an Android APK for sideloading
    - yarn workspace @storyteller-platform/mobile dlx eas-cli@latest build
      --profile preview -p android --no-wait --non-interactive

prerelease-mobile:
  stage: prerelease
  image: alpine:latest
  rules:
