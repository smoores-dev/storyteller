# Whisper.cpp build jobs - triggered manually
# Binaries are uploaded to GitLab Generic Package Registry
# Models are downloaded directly from HuggingFace at runtime
#
# these jobs use our base images; sycl installs oneapi build tools in-job

.whisper-build-base:
  stage: whisper-build
  variables:
    WHISPER_VERSION: "1.8.3"
    CMAKE_FLAGS: ""
  rules:
    - when: manual
      allow_failure: true
  script:
    - git clone --depth 1 --branch v${WHISPER_VERSION}
      https://github.com/ggml-org/whisper.cpp.git whisper-src
    - cd whisper-src && git apply
      ${CI_PROJECT_DIR}/scripts/whisper-server-config.patch && cd ..
    - cd whisper-src
    - cmake -B build -DBUILD_SHARED_LIBS=OFF ${CMAKE_FLAGS}
    - cmake --build build -j --config Release
    - mkdir -p ../dist
    - cp -r build/bin ../dist/bin
    - chmod +x ../dist/bin/*
    - cd ..
    - apt-get update && apt-get install -y jq || true
    - tar -czvf whisper-cpp-${VARIANT}.tar.gz -C dist .
    - echo "Deleting existing package files with same name..."
    - |
      PACKAGE_ID=$(curl -s --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=whisper-cpp&package_version=${WHISPER_VERSION}" \
        | jq -r '.[0].id // empty')
      if [ -n "$PACKAGE_ID" ]; then
        FILE_IDS=$(curl -s --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${PACKAGE_ID}/package_files" \
          | jq -r ".[] | select(.file_name == \"whisper-cpp-${VARIANT}.tar.gz\") | .id")
        for FILE_ID in $FILE_IDS; do
          echo "Deleting file ID: $FILE_ID"
          curl -s --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${PACKAGE_ID}/package_files/${FILE_ID}"
        done
      fi
    - echo "Uploading to GitLab Generic Package Registry..."
    - |
      curl --fail-with-body --show-error \
           --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "whisper-cpp-${VARIANT}.tar.gz" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/whisper-cpp/${WHISPER_VERSION}/whisper-cpp-${VARIANT}.tar.gz"

# macOS builds (use brew, no base image)

build-whisper-darwin-arm64-coreml:
  timeout: 10m
  retry:
    max: 2
    when:
      - job_execution_timeout
  extends: .whisper-build-base
