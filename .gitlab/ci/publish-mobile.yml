publish-mobile:
  stage: publish
  image: node:24
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^mobile-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?)?$/'
  script:
    - echo $EXPO_ASC_API_KEY_BASE64 | base64 -d > $EXPO_ASC_API_KEY_PATH
    - yarn
    - yarn workspace @storyteller-platform/mobile dlx eas-cli@latest build
      --profile production -p all --auto-submit --no-wait --non-interactive
    # Build an Android APK for sideloading
    - yarn workspace @storyteller-platform/mobile dlx eas-cli@latest build
      --profile preview -p android --no-wait --non-interactive

prerelease-mobile:
  stage: prerelease
  image: alpine:latest
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^mobile-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?)?$/'
  script:
    - apk add curl jq
    - version=$(echo $CI_COMMIT_TAG | sed -r 's/mobile-//')
    - package=$(echo $CI_COMMIT_TAG | sed -r 's/-v\d+\.\d+\.\d+$//')
    - 'from_sha=$(curl -H "PRIVATE-TOKEN: $CI_API_TOKEN"
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases" | jq -r "first(.[] |
      select(.tag_name | startswith(\"$package\")) | .commit.short_id)")'
    - to_sha=$CI_COMMIT_SHORT_SHA
    - 'curl -H "PRIVATE-TOKEN: $CI_API_TOKEN"
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/changelog?version=${version}&from=${from_sha}&to=${to_sha}&trailer=Changelog-mobile"
      | jq -r .notes > release_notes.md'
  artifacts:
    paths:
      - release_notes.md

release-mobile:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: prerelease-mobile
      artifacts: true
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^mobile-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?)?$/'
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: release_notes.md
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_SHA"
    assets:
      links:
        - name: "iOS"
          url: "https://apps.apple.com/us/app/storyteller-reader/id6474467720"
        - name: "Android"
          url: "https://play.google.com/store/apps/details?id=dev.smoores.Storyteller"
