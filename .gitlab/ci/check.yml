check:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:main
  stage: check
  tags: [saas-linux-large-amd64]
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
  script:
    - yarn
    - yarn check

check-versions:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:main
  stage: check
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
  script:
    - git fetch origin main --depth 1
    - ./scripts/check-versions.sh

check-docs:
  image: registry.gitlab.com/storyteller-platform/storyteller-base:main
  stage: check
  tags: [saas-linux-large-amd64]
  rules:
    - if:
        ($CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH ==
        "main" && $CI_COMMIT_TAG == null))
      changes:
        - docs/**/*
  script:
    - yarn
    - yarn build:docs

