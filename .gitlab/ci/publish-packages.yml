publish-align-sea-darwin-arm64:
  extends: .publish-align-sea-base
  tags: [saas-macos-medium-m1]
  variables:
    VARIANT: "darwin-arm64"
  before_script:
    - brew install curl
    - nvm install 25
    - nvm use 25

publish-align-sea-linux-x64:
  image: node:25
  extends: .publish-align-sea-base
  variables:
    VARIANT: "linux-x64"
  before_script:
    - apt update
    - DEBIAN_FRONTEND=noninteractive apt install -y jq

