# Web image publish jobs
# Triggered on web-* tags (e.g., web-v2.3.0, web-v2.3.0-experimental.1)

.publish-web-base:
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  stage: publish
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^web-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?|\d+)?$/'
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker context create gitlab-ci
    - docker buildx create --use --driver=docker-container gitlab-ci

# CPU builds (multi-arch: amd64 + arm64)
# these must be separate jobs because they need different runner tags
publish-web-amd64:
  extends: .publish-web-base
  tags: [saas-linux-large-amd64]
  script:
    - docker buildx build --build-arg CI_COMMIT_TAG=$CI_COMMIT_TAG --build-arg
      BASE_TAG=main --push -f Dockerfile --cache-from
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-amd64:latest --cache-to
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-amd64:latest,mode=max --tag
      $CI_REGISTRY_IMAGE/amd64:$CI_COMMIT_SHORT_SHA .

publish-web-arm64:
  extends: .publish-web-base
  tags: [saas-linux-large-arm64]
  script:
    - docker buildx build --build-arg CI_COMMIT_TAG=$CI_COMMIT_TAG --build-arg
      BASE_TAG=main --push -f Dockerfile --cache-from
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-arm64:latest --cache-to
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-arm64:latest,mode=max --tag
      $CI_REGISTRY_IMAGE/arm64:$CI_COMMIT_SHORT_SHA .

# GPU/accelerated builds (amd64 only)
# BASE_TAG mapping:
#   cuda-* variants use their base image (cuda-13.1-main, etc.)
#   vulkan uses vulkan-main
#   blas uses blas-main
#   sycl uses sycl-main
#   rocm uses main base (main) since ROCm libs are in the whisper binary
publish-web-gpu:
  extends: .publish-web-base
  tags: [saas-linux-large-amd64]
  parallel:
    matrix:
      - VARIANT: cuda-13.1.0
        BASE_TAG: cuda-13.1-main
      - VARIANT: cuda-12.9.0
        BASE_TAG: cuda-12.9-main
      - VARIANT: cuda-11.8.0
        BASE_TAG: cuda-11.8-main
      - VARIANT: vulkan
        BASE_TAG: vulkan-main
      - VARIANT: rocm
        BASE_TAG: rocm-main
      - VARIANT: blas
        BASE_TAG: blas-main
      - VARIANT: sycl
        BASE_TAG: sycl-main
  script:
    - docker buildx build --build-arg CI_COMMIT_TAG=$CI_COMMIT_TAG --build-arg
      BASE_TAG=$BASE_TAG --build-arg WHISPER_VARIANT=linux-x64-$VARIANT --push
      -f Dockerfile --cache-from
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-amd64-$VARIANT:latest
      --cache-to
      type=registry,ref=$CI_REGISTRY_IMAGE/cache-amd64-$VARIANT:latest,mode=max
      --tag $CI_REGISTRY_IMAGE/amd64-$VARIANT:$CI_COMMIT_SHORT_SHA .

# Create multi-arch manifests and version tags
publish-web-multiarch:
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  stage: post-publish
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^web-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?|\d+)?$/'
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # determine if this is a stable release
    - |
      if echo "$CI_COMMIT_TAG" | grep -qvE '\-(alpha|beta|rc|experimental|dev|test|preview)'; then
        IS_STABLE=true
      else
        IS_STABLE=false
        echo "Prerelease version: $CI_COMMIT_TAG"
      fi
    # determine prerelease base tag (e.g., 2.3.0-experimental for 2.3.0-experimental.4)
    - |
      if echo "$CI_COMMIT_TAG" | grep -qE '\-(alpha|beta|rc|experimental|dev|test|preview)\.\d+$'; then
        PRERELEASE_BASE=$(echo "$CI_COMMIT_TAG" | sed -E 's/\.\d+$//')
        echo "Prerelease base tag: $PRERELEASE_BASE"
      else
        PRERELEASE_BASE=""
      fi

    # create multi-arch manifest for default (cpu) variant
    - |
      TAGS="--tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      if [ "$IS_STABLE" = "true" ]; then
        TAGS="$TAGS --tag $CI_REGISTRY_IMAGE:latest --tag $CI_REGISTRY_IMAGE:web-v2"
      fi
      if [ -n "$PRERELEASE_BASE" ]; then
        TAGS="$TAGS --tag $CI_REGISTRY_IMAGE:$PRERELEASE_BASE"
      fi
      docker buildx imagetools create $TAGS \
        $CI_REGISTRY_IMAGE/amd64:$CI_COMMIT_SHORT_SHA \
        $CI_REGISTRY_IMAGE/arm64:$CI_COMMIT_SHORT_SHA

    # create tags for GPU variants (x64 only)
    # format: VARIANT:MAJOR_ALIAS (empty means no major version alias)
    - |
      for entry in "cuda-13.1.0:cuda-13" "cuda-12.9.0:cuda-12" "cuda-11.8.0:cuda-11" "vulkan:" "rocm:" "blas:" "sycl:"; do
        VARIANT="${entry%%:*}"
        MAJOR_ALIAS="${entry#*:}"

        TAGS="--tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG-$VARIANT"
        if [ "$IS_STABLE" = "true" ]; then
          TAGS="$TAGS --tag $CI_REGISTRY_IMAGE:latest-$VARIANT"
          if [ -n "$MAJOR_ALIAS" ]; then
            TAGS="$TAGS --tag $CI_REGISTRY_IMAGE:latest-$MAJOR_ALIAS"
          fi
        fi
        if [ -n "$PRERELEASE_BASE" ]; then
          TAGS="$TAGS --tag $CI_REGISTRY_IMAGE:$PRERELEASE_BASE-$VARIANT"
        fi

        echo "Creating tags for $VARIANT: $TAGS"
        docker buildx imagetools create $TAGS \
          $CI_REGISTRY_IMAGE/amd64-$VARIANT:$CI_COMMIT_SHORT_SHA
      done

prerelease-web:
  stage: prerelease
  image: alpine:latest
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^web-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?|\d+)?$/'
  script:
    - apk add curl jq
    - version=$(echo $CI_COMMIT_TAG | sed -r 's/web-//')
    - package=$(echo $CI_COMMIT_TAG | sed -r 's/-v\d+\.\d+\.\d+.*$//')
    - 'from_sha=$(curl -H "PRIVATE-TOKEN: $CI_API_TOKEN"
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases" | jq -r "first(.[] |
      select(.tag_name | startswith(\"$package\")) | .commit.short_id)")'
    - to_sha=$CI_COMMIT_SHORT_SHA
    - 'curl -H "PRIVATE-TOKEN: $CI_API_TOKEN"
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/changelog?version=${version}&from=${from_sha}&to=${to_sha}&trailer=Changelog-web"
      | jq -r .notes > release_notes.md'
  artifacts:
    paths:
      - release_notes.md

release-web:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: prerelease-web
      artifacts: true
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^web-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?|\d+)?$/'
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: release_notes.md
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_SHA"
    assets:
      links:
        - name: "Image for $CI_COMMIT_TAG"
          url: "https://$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
